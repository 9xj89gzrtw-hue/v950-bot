# v9.52 ArgoCD GitOps Configuration
# ====================================
# GitOps: Git is the single source of truth.
# ArgoCD watches Git repo → auto-syncs to K8s cluster.
#
# Deploy ArgoCD:
#   kubectl create namespace argocd
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#   kubectl port-forward svc/argocd-server -n argocd 8080:443
#   # Login: admin / (get password from kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
#
# Apply this Application:
#   kubectl apply -f gitops/argocd-application.yaml

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: v950-telegram-bot
  namespace: argocd
  labels:
    app: v950-bot
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/v950-bot  # CHANGE THIS
    targetRevision: main
    path: deploy/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: v950-bot
  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual changes
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10

---
# ApplicationSet for multi-environment (dev/staging/prod)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: v950-bot-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            branch: develop
            namespace: v950-bot-dev
          - env: staging
            branch: staging
            namespace: v950-bot-staging
          - env: prod
            branch: main
            namespace: v950-bot-prod
  template:
    metadata:
      name: 'v950-bot-{{env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/YOUR_USERNAME/v950-bot
        targetRevision: '{{branch}}'
        path: deploy/kubernetes
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
