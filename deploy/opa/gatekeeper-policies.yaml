# v9.53 OPA Gatekeeper — Policy-as-Code
# ========================================
# Enforce security policies on Kubernetes cluster.
# Block non-compliant resources BEFORE they're created.
#
# Install Gatekeeper:
#   kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper/release-3.14/deploy/gatekeeper.yaml
#   kubectl apply -f opa/

---
# Policy 1: Require resource limits on all containers
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredresources
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredResources
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredresources
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("container %v must have memory limits", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("container %v must have CPU limits", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.requests.memory
          msg := sprintf("container %v must have memory requests", [container.name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: require-resources
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces:
      - "v950-bot"
      - "v950-bot-dev"
      - "v950-bot-prod"

---
# Policy 2: Prohibit :latest image tag in production
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sprohiblatesttag
spec:
  crd:
    spec:
      names:
        kind: K8sProhibitLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sprohiblatesttag
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          endswith(container.image, ":latest")
          msg := sprintf("container %v uses :latest tag — prohibited in production", [container.name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sProhibitLatestTag
metadata:
  name: prohibit-latest
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces:
      - "v950-bot-prod"

---
# Policy 3: Require labels (app, version, environment)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels
        
        required_labels := {"app", "version"}
        
        violation[{"msg": msg}] {
          missing := required_labels - {label | input.review.object.metadata.labels[label]}
          count(missing) > 0
          msg := sprintf("missing required labels: %v", [missing])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: require-labels
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
  parameters:
    labels: ["app", "version"]

---
# Policy 4: Only allow images from trusted registry
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8strustedregistry
spec:
  crd:
    spec:
      names:
        kind: K8sTrustedRegistry
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8strustedregistry
        
        trusted_registries := {"ghcr.io/v950/", "docker.io/library/python"}
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not is_trusted(container.image)
          msg := sprintf("container %v image %v not from trusted registry", [container.name, container.image])
        }
        
        is_trusted(image) {
          registry := trusted_registries[_]
          startswith(image, registry)
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sTrustedRegistry
metadata:
  name: trusted-registry
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces:
      - "v950-bot-prod"
