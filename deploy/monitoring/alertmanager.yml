# Alertmanager configuration
# Routes alerts to Telegram (via webhook) or email

route:
  receiver: 'telegram'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://bot:5000/alert'  # bot's alert endpoint
        send_resolved: true
  
  - name: 'email'
    email_configs:
      - to: 'admin@example.com'
        from: 'alerts@v950.local'
        smarthost: 'smtp:25'
