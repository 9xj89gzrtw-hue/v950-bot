# v9.55 Kiali — Service Mesh Observability
# ===========================================
# Visual dashboard for Istio service mesh.
# Shows: topology, traffic flow, latency, errors, mTLS status.
#
# Install:
#   helm install kiali kiali/kiali-server \
#     --namespace istio-system \
#     -f kiali-values.yaml
#
# Access:
#   kubectl port-forward svc/kiali -n istio-system 20001:20001
#   http://localhost:20001 (admin/admin)

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kiali
  namespace: istio-system
data:
  config.yaml: |
    api:
      version: 1
    auth:
      strategy: login
      login:
        admin:
          username: admin
          password: admin  # change in production
    deployment:
      namespace: istio-system
      view_only_mode: false
    external_services:
      prometheus:
        url: http://prometheus-server.monitoring.svc.cluster.local:9090
      grafana:
        url: http://grafana.monitoring.svc.cluster.local:3000
        enabled: true
      jaeger:
        url: http://jaeger-query.observability.svc.cluster.local:16686
        enabled: true
      # v9.50 custom dashboards
      custom_dashboards:
        - name: v950-bot
          title: v9.50 Bot Metrics
          items:
            - chart:
                name: LLM Calls
                unit: "calls/min"
                spans: 6
                metrics:
                  - name: v939_llm_calls_total
                    dataSource: prometheus
            - chart:
                name: Gate Duration
                unit: "seconds"
                spans: 6
                metrics:
                  - name: v939_gate_duration_seconds
                    dataSource: prometheus
            - chart:
                name: Cache Hits
                unit: "count"
                spans: 12
                metrics:
                  - name: v939_cache_total
                    dataSource: prometheus
    kubernetes_config:
      cache_enabled: true
      # Watch v950-bot namespace
      excluded_workloads:
        - DaemonSet
        - Job
        - CronJob
        - ReplicationController
    istio_labels:
      app_label_name: app
      version_label_name: version
    server:
      address: 0.0.0.0
      port: 20001
      web_root: /
      cors:
        enabled: true

---
# Kiali dashboard for v9.50 bot traffic
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kiali-v950-monitor
  namespace: istio-system
spec:
  selector:
    matchLabels:
      app: kiali
  namespaceSelector:
    matchNames:
      - istio-system
      - v950-bot
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
