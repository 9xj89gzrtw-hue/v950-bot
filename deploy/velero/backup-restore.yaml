# v9.55 Velero — Backup and Restore
# ====================================
# Backup K8s resources + PV data to S3.
# Disaster recovery: restore entire cluster from backup.
#
# Install Velero:
#   velero install \
#     --provider aws \
#     --bucket v950-velero-backup \
#     --backup-location-config region=eu-west-1 \
#     --snapshot-location-config region=eu-west-1 \
#     --secret-file credentials-velero
#   kubectl apply -f velero/

---
# Backup: daily scheduled backup of v950-bot namespace
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: v950-bot-daily-backup
  namespace: velero
  labels:
    app: v950-bot
spec:
  schedule: "0 2 * * *"  # daily at 02:00 UTC
  template:
    includedNamespaces:
      - v950-bot
    includedResources:
      - deployments
      - services
      - secrets
      - configmaps
      - persistentvolumeclaims
      - networkpolicies
      - serviceaccounts
      - roles
      - rolebindings
    excludeResources:
      - pods  # pods are ephemeral, will be recreated
    hooks:
      resources:
        - name: bot-pre-backup-hook
          includedNamespaces:
            - v950-bot
          labelSelector:
            matchLabels:
              app: telegram-bot
          pre:
            - exec:
                container: bot
                command:
                  - python3
                  - -c
                  - "import json; open('/app/state/pre-backup.json','w').write(json.dumps({'ts':'pre-backup'}))"
                onError: Continue
                timeout: 30s
    storageLocation: default
    ttl: 720h  # 30 days retention

---
# Backup: weekly full cluster backup
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: v950-weekly-full-backup
  namespace: velero
spec:
  schedule: "0 3 * * 0"  # weekly Sunday 03:00 UTC
  template:
    includedNamespaces:
      - v950-bot
      - monitoring
      - istio-system
      - vault
    storageLocation: default
    ttl: 2160h  # 90 days retention
    snapshotVolumes: true

---
# Backup: on-demand before deploy
apiVersion: velero.io/v1
kind: Backup
metadata:
  name: v950-pre-deploy-backup
  namespace: velero
  labels:
    app: v950-bot
    type: pre-deploy
spec:
  includedNamespaces:
    - v950-bot
  storageLocation: default
  ttl: 168h  # 7 days

---
# Restore: disaster recovery
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: v950-disaster-recovery
  namespace: velero
  labels:
    app: v950-bot
    type: disaster-recovery
spec:
  backupName: v950-bot-daily-backup  # restore from latest daily backup
  includedNamespaces:
    - v950-bot
  restoreStatus:
    includedResources:
      - deployments
      - services
      - secrets
      - configmaps
      - persistentvolumeclaims
  hooks:
    resources:
      - name: bot-post-restore-hook
        includedNamespaces:
          - v950-bot
        labelSelector:
          matchLabels:
            app: telegram-bot
        post:
          - exec:
              container: bot
              command:
                - python3
                - -c
                - "print('restored successfully')"
              timeout: 30s

---
# BackupStorageLocation: S3 config
apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: default
  namespace: velero
spec:
  provider: aws
  objectStorage:
    bucket: v950-velero-backup
    prefix: v950-bot
  default: true
  config:
    region: eu-west-1
  credential:
    name: cloud-credentials
    key: cloud

---
# VolumeSnapshotLocation: EBS snapshots
apiVersion: velero.io/v1
kind: VolumeSnapshotLocation
metadata:
  name: default
  namespace: velero
spec:
  provider: aws
  config:
    region: eu-west-1
