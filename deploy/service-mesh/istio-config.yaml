# v9.52 Istio Service Mesh Configuration
# ==========================================
# Service mesh: mTLS, traffic management, observability, circuit breaker.
#
# Install Istio:
#   istioctl install --set values.defaultRevision=default
#   kubectl label namespace v950-bot istio-injection=enabled
#
# Apply:
#   kubectl apply -f service-mesh/

---
# DestinationRule: mTLS + load balancing
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: telegram-bot-dr
  namespace: v950-bot
spec:
  host: telegram-bot
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL  # automatic mTLS
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
    connectionPool:
      tcp:
        maxConnections: 10
      http:
        http1MaxPendingRequests: 5
        maxRequestsPerConnection: 100

---
# VirtualService: routing rules
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: telegram-bot-vs
  namespace: v950-bot
spec:
  hosts:
    - telegram-bot
  http:
    # Canary: 90% stable, 10% canary
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: telegram-bot
            subset: canary
          weight: 100
    - route:
        - destination:
            host: telegram-bot
            subset: stable
          weight: 90
        - destination:
            host: telegram-bot
            subset: canary
          weight: 10
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure"
      timeout: 30s

---
# PeerAuthentication: enforce mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: v950-bot
spec:
  mtls:
    mode: STRICT  # all traffic must use mTLS

---
# AuthorizationPolicy: zero-trust
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: telegram-bot-authz
  namespace: v950-bot
spec:
  selector:
    matchLabels:
      app: telegram-bot
  action: ALLOW
  rules:
    # Allow from same namespace
    - from:
        - source:
            namespaces: ["v950-bot"]
    # Allow from istio-system (ingress gateway)
    - from:
        - source:
            namespaces: ["istio-system"]

---
# ServiceEntry: external services (Telegram API, Pollinations, z-ai)
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-apis
  namespace: v950-bot
spec:
  hosts:
    - api.telegram.org
    - text.pollinations.ai
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
