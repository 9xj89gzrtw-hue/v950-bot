# v9.54 Tekton Pipelines — Kubernetes-native CI/CD
# ====================================================
# Alternative to GitHub Actions: Tekton runs in K8s cluster.
#
# Install Tekton:
#   kubectl apply -f https://storage.googleapis.com/tekton-pipelines/pipelines/previous/v0.50.0/release.yaml
#   kubectl apply -f tekton/

---
# Task: Run test suite
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: v950-test
  namespace: v950-bot
spec:
  steps:
    - name: install-deps
      image: python:3.12-slim
      script: |
        pip install z3-solver gensim scikit-learn numpy cryptography
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install sentence-transformers transformers
        apt-get update && apt-get install -y nodejs npm curl
        npm install -g z-ai-web-dev-sdk
    
    - name: g0-check
      image: python:3.12-slim
      script: |
        python scripts/g0_check.py
    
    - name: z3-verify
      image: python:3.12-slim
      script: |
        python scripts/v928_z3_formal_verify.py
    
    - name: red-team
      image: python:3.12-slim
      script: |
        python scripts/v946_redteam.py run
    
    - name: safety-benchmark
      image: python:3.12-slim
      script: |
        python scripts/v949_hybrid_safety.py benchmark
    
    - name: chaos
      image: python:3.12-slim
      script: |
        python scripts/v947_chaos.py run-all

---
# Task: Build Docker image
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: v950-build
  namespace: v950-bot
spec:
  params:
    - name: image-tag
      type: string
      default: latest
  steps:
    - name: build-and-push
      image: docker:24
      script: |
        docker build -t ghcr.io/v950/telegram-bot:$(params.image-tag) deploy/
        docker push ghcr.io/v950/telegram-bot:$(params.image-tag)

---
# Task: Deploy to K8s
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: v950-deploy
  namespace: v950-bot
spec:
  params:
    - name: image-tag
      type: string
  steps:
    - name: deploy
      image: bitnami/kubectl:latest
      script: |
        kubectl set image deployment/telegram-bot \
          bot=ghcr.io/v950/telegram-bot:$(params.image-tag) \
          -n v950-bot
        kubectl rollout status deployment/telegram-bot \
          -n v950-bot --timeout=120s
    
    - name: notify-telegram
      image: curlimages/curl:latest
      script: |
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🚀 Deployed $(params.image-tag)\"}"

---
# Pipeline: test → build → deploy
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: v950-cicd
  namespace: v950-bot
spec:
  params:
    - name: image-tag
      type: string
      default: latest
  tasks:
    - name: test
      taskRef:
        name: v950-test
    
    - name: build
      taskRef:
        name: v950-build
      params:
        - name: image-tag
          value: $(params.image-tag)
      runAfter:
        - test
    
    - name: deploy
      taskRef:
        name: v950-deploy
      params:
        - name: image-tag
          value: $(params.image-tag)
      runAfter:
        - build

---
# Trigger: auto-run on Git push
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: v950-trigger
  namespace: v950-bot
spec:
  params:
    - name: git-revision
      description: Git revision
    - name: image-tag
      description: Image tag (git SHA)
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: v950-cicd-run-
      spec:
        pipelineRef:
          name: v950-cicd
        params:
          - name: image-tag
            value: $(tt.params.image-tag)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: v950-binding
  namespace: v950-bot
spec:
  params:
    - name: git-revision
      value: $(body.head_commit.id)
    - name: image-tag
      value: $(body.head_commit.id[0:7])

---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: v950-listener
  namespace: v950-bot
spec:
  serviceAccountName: tekton-triggers
  triggers:
    - bindings:
        - ref: v950-binding
      template:
        ref: v950-trigger
