# v9.51 Kubernetes Deployment Manifest
# Deploy: kubectl apply -f kubernetes/
---
apiVersion: v1
kind: Namespace
metadata:
  name: v950-bot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  namespace: v950-bot
  labels:
    app: telegram-bot
    version: v9.50
spec:
  replicas: 1  # single replica (Telegram doesn't support multiple consumers)
  selector:
    matchLabels:
      app: telegram-bot
  strategy:
    type: Recreate  # no rolling update (single replica)
  template:
    metadata:
      labels:
        app: telegram-bot
        version: v9.50
    spec:
      containers:
        - name: bot
          image: v950/telegram-bot:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-secrets
                  key: bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-secrets
                  key: chat-id
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "print('alive')"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import json; json.load(open('/app/v944_telegram_config.json'))"
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: bot-state
              mountPath: /app/state
      volumes:
        - name: bot-state
          persistentVolumeClaim:
            claimName: bot-state-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bot-state-pvc
  namespace: v950-bot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-secrets
  namespace: v950-bot
type: Opaque
stringData:
  bot-token: "YOUR_BOT_TOKEN_HERE"
  chat-id: "YOUR_CHAT_ID_HERE"
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-bot
  namespace: v950-bot
spec:
  selector:
    app: telegram-bot
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telegram-bot-hpa
  namespace: v950-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telegram-bot
  minReplicas: 1
  maxReplicas: 1  # Telegram doesn't support multiple consumers
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
