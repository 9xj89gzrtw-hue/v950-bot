# v9.55 Cilium — Network Policies (eBPF-based)
# ===============================================
# Replace kube-proxy with eBPF. Network policies at kernel level.
#
# Install Cilium:
#   helm install cilium cilium/cilium --namespace kube-system \
#     --set kubeProxyReplacement=strict \
#     --set k8sServiceHost=API_SERVER_IP \
#     --set k8sServicePort=6443
#   kubectl apply -f cilium/

---
# NetworkPolicy: default deny all (zero-trust baseline)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: v950-bot
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# NetworkPolicy: allow bot to reach Telegram API + Pollinations
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bot-egress
  namespace: v950-bot
spec:
  podSelector:
    matchLabels:
      app: telegram-bot
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Telegram API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    
    # Pollinations API (also 443)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    
    # Prometheus (metrics scraping)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090

---
# NetworkPolicy: allow ingress from Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: v950-bot
spec:
  podSelector:
    matchLabels:
      app: telegram-bot
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090

---
# CiliumNetworkPolicy: L7-aware (HTTP method/path filtering)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bot-l7-policy
  namespace: v950-bot
spec:
  endpointSelector:
    matchLabels:
      app: telegram-bot
  egress:
    # Allow HTTPS to api.telegram.org only
    - toFQDNs:
        - matchName: api.telegram.org
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          rules:
            http:
              - method: POST
                path: /bot.*/sendMessage
              - method: POST
                path: /bot.*/getUpdates
              - method: POST
                path: /bot.*/sendChatAction
    
    # Allow HTTPS to Pollinations
    - toFQDNs:
        - matchName: text.pollinations.ai
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          rules:
            http:
              - method: POST
                path: /openai
    
    # Allow Wikipedia REST API (factual queries)
    - toFQDNs:
        - matchName: en.wikipedia.org
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /api/rest_v1/.*
    
    # Allow DuckDuckGo API
    - toFQDNs:
        - matchName: api.duckduckgo.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /.*

---
# CiliumNetworkPolicy: deny all other FQDNs
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: deny-all-fqdn
  namespace: v950-bot
spec:
  endpointSelector:
    matchLabels:
      app: telegram-bot
  egress:
    - toFQDNs:
        - matchPattern: "*"
      action: Deny
