services:
  - type: web
    name: v950-telegram-bot
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      npm install -g z-ai-web-dev-sdk 2>/dev/null || true
    startCommand: python v948_pullbot.py --loop --interval 10
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    autoDeploy: true
